services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    runtime: nvidia
    ipc: host
    shm_size: "8gb"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      MODELS_DIR: /data/models
      HF_CACHE_DIR: /data/hf_cache
      VLLM_GPU_MEMORY_UTILIZATION: ${VLLM_GPU_MEMORY_UTILIZATION:-0.85}
      VLLM_ENFORCE_EAGER: ${VLLM_ENFORCE_EAGER:-true}
      VLLM_ATTENTION_BACKEND: ${VLLM_ATTENTION_BACKEND:-}
      VLLM_ENABLE_PREFIX_CACHING: ${VLLM_ENABLE_PREFIX_CACHING:-true}
      VLLM_MAX_NUM_SEQS: ${VLLM_MAX_NUM_SEQS:-16}
      VLLM_MAX_NUM_BATCHED_TOKENS: ${VLLM_MAX_NUM_BATCHED_TOKENS:-8192}
      VLLM_TENSOR_PARALLEL_SIZE: ${VLLM_TENSOR_PARALLEL_SIZE:-}
      VLLM_MAX_MODEL_LEN: ${VLLM_MAX_MODEL_LEN:-}
      VLLM_ENABLE_CHUNKED_PREFILL: ${VLLM_ENABLE_CHUNKED_PREFILL:-}
      VLLM_SWAP_SPACE: ${VLLM_SWAP_SPACE:-}
      VLLM_KV_CACHE_DTYPE: ${VLLM_KV_CACHE_DTYPE:-}
      VLLM_TRUST_REMOTE_CODE: ${VLLM_TRUST_REMOTE_CODE:-false}
      VLLM_DISABLE_LOG_REQUESTS: ${VLLM_DISABLE_LOG_REQUESTS:-true}
      BITNET_SERVER_BIN: ${BITNET_SERVER_BIN:-/usr/local/bin/bitnet-server}
      BITNET_GPU_LAYERS: ${BITNET_GPU_LAYERS:-0}
      BITNET_CTX_SIZE: ${BITNET_CTX_SIZE:-4096}
      BITNET_THREADS: ${BITNET_THREADS:-}
      BITNET_BATCH_SIZE: ${BITNET_BATCH_SIZE:-512}
      BITNET_UBATCH_SIZE: ${BITNET_UBATCH_SIZE:-128}
      BITNET_PARALLEL: ${BITNET_PARALLEL:-1}
      BITNET_FLASH_ATTN: ${BITNET_FLASH_ATTN:-false}
      BITNET_MLOCK: ${BITNET_MLOCK:-true}
      BITNET_STARTUP_TIMEOUT_S: ${BITNET_STARTUP_TIMEOUT_S:-30}
      HUNYUAN_UI_URL: ${HUNYUAN_UI_URL:-}
      COMFYUI_UI_URL: ${COMFYUI_UI_URL:-}
      A1111_UI_URL: ${A1111_UI_URL:-}
    env_file: .env
#    ports:
#      - "8000:8000"
    volumes:
      - /docker/ai-models/ocabra/models:/data/models
      - /docker/ai-models/ocabra/hf_cache:/data/hf_cache
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ocabra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ocabra}
      POSTGRES_DB: ${POSTGRES_DB:-ocabra}
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ocabra}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - /docker/ai-models/ollama:/root/.ollama
    ports:
      - "7869:11434"
    restart: unless-stopped

  hunyuan:
    build:
      context: ./Hunyuan3D-2.1
      dockerfile: docker/Dockerfile
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      IDLE_TIMEOUT_SECONDS: ${HUNYUAN_IDLE_UNLOAD_SECONDS:-300}
      IDLE_CHECK_INTERVAL_SECONDS: 30
      HUNYUAN_ENABLE_CPU_OFFLOAD: ${HUNYUAN_ENABLE_CPU_OFFLOAD:-true}
      MALLOC_TRIM_THRESHOLD_: 0
      HF_HOME: /root/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /root/.cache/huggingface/hub
    volumes:
      - /docker/ai-models/ocabra/hf_cache:/root/.cache/huggingface
      - /docker/ai-models/ocabra/models/hunyuan3d:/workspace/Hunyuan3D-2.1/gradio_cache
    ports:
      - "${HUNYUAN_PORT:-8480}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 180s
    restart: unless-stopped

  comfyui:
    build:
      context: ./services/comfyui
      dockerfile: Dockerfile
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HF_HOME: /root/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /root/.cache/huggingface/hub
    volumes:
      - /docker/ai-models/ocabra/hf_cache:/root/.cache/huggingface
      - /docker/ai-models/ocabra/models/image/checkpoints:/opt/ComfyUI/models/checkpoints
      - /docker/ai-models/ocabra/models/image/vae:/opt/ComfyUI/models/vae
      - /docker/ai-models/ocabra/models/image/loras:/opt/ComfyUI/models/loras
      - /docker/ai-models/ocabra/models/image/embeddings:/opt/ComfyUI/models/embeddings
      - /docker/ai-models/ocabra/models/image/controlnet:/opt/ComfyUI/models/controlnet
      - /docker/ai-models/ocabra/models/image/upscalers:/opt/ComfyUI/models/upscale_models
      - /docker/ai-models/ocabra/models/comfyui:/opt/ComfyUI/user
    ports:
      - "${COMFYUI_PORT:-8188}:8188"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  a1111:
    build:
      context: ./services/a1111
      dockerfile: Dockerfile
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /home/a1111/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /home/a1111/.cache/huggingface/hub
      COMMANDLINE_ARGS: --listen --api --port 7860 --skip-torch-cuda-test --enable-insecure-extension-access
    volumes:
      - /docker/ai-models/ocabra/hf_cache:/home/a1111/.cache/huggingface
      - a1111_venv:/opt/stable-diffusion-webui/venv
      - /docker/ai-models/ocabra/models/image/checkpoints:/opt/stable-diffusion-webui/models/Stable-diffusion
      - /docker/ai-models/ocabra/models/image/vae:/opt/stable-diffusion-webui/models/VAE
      - /docker/ai-models/ocabra/models/image/loras:/opt/stable-diffusion-webui/models/Lora
      - /docker/ai-models/ocabra/models/image/embeddings:/opt/stable-diffusion-webui/embeddings
      - /docker/ai-models/ocabra/models/image/upscalers:/opt/stable-diffusion-webui/models/ESRGAN
      - /docker/ai-models/ocabra/models/a1111:/opt/stable-diffusion-webui/config_states
      - ./services/a1111/ocabra-free-memory:/opt/stable-diffusion-webui/extensions/ocabra-free-memory
    ports:
      - "${A1111_PORT:-7860}:7860"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/sdapi/v1/memory"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 180s
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "8484:80"
      - "${SERVICES_PORTAL_PORT:-8485}:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/caddy_data:/data
      - ./caddy/caddy_config:/config
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  a1111_venv:
