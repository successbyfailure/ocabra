services:
  api:
    # Default: slim image (no AI backends pre-installed). Backends are
    # installed on demand into /data/backends via BackendInstaller.
    # For a rollback to the legacy fat image with everything pre-installed,
    # use:  docker compose -f docker-compose.yml -f docker-compose.fat.yml ...
    build:
      context: ./backend
      dockerfile: Dockerfile.slim
    image: ocabra-api:slim
    runtime: nvidia
    ipc: host
    shm_size: "8gb"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      MODELS_DIR: /data/models
      HF_CACHE_DIR: /data/hf_cache
      VLLM_GPU_MEMORY_UTILIZATION: ${VLLM_GPU_MEMORY_UTILIZATION:-0.85}
      VLLM_ENFORCE_EAGER: ${VLLM_ENFORCE_EAGER:-true}
      VLLM_ATTENTION_BACKEND: ${VLLM_ATTENTION_BACKEND:-}
      VLLM_ENABLE_PREFIX_CACHING: ${VLLM_ENABLE_PREFIX_CACHING:-true}
      VLLM_MAX_NUM_SEQS: ${VLLM_MAX_NUM_SEQS:-16}
      VLLM_MAX_NUM_BATCHED_TOKENS: ${VLLM_MAX_NUM_BATCHED_TOKENS:-8192}
      VLLM_TENSOR_PARALLEL_SIZE: ${VLLM_TENSOR_PARALLEL_SIZE:-}
      VLLM_MAX_MODEL_LEN: ${VLLM_MAX_MODEL_LEN:-}
      VLLM_ENABLE_CHUNKED_PREFILL: ${VLLM_ENABLE_CHUNKED_PREFILL:-}
      VLLM_SWAP_SPACE: ${VLLM_SWAP_SPACE:-}
      VLLM_KV_CACHE_DTYPE: ${VLLM_KV_CACHE_DTYPE:-}
      VLLM_TRUST_REMOTE_CODE: ${VLLM_TRUST_REMOTE_CODE:-false}
      VLLM_DISABLE_LOG_REQUESTS: ${VLLM_DISABLE_LOG_REQUESTS:-true}
      BITNET_SERVER_BIN: ${BITNET_SERVER_BIN:-/usr/local/bin/bitnet-server}
      BITNET_GPU_LAYERS: ${BITNET_GPU_LAYERS:-0}
      BITNET_CTX_SIZE: ${BITNET_CTX_SIZE:-4096}
      BITNET_THREADS: ${BITNET_THREADS:-}
      BITNET_BATCH_SIZE: ${BITNET_BATCH_SIZE:-512}
      BITNET_UBATCH_SIZE: ${BITNET_UBATCH_SIZE:-128}
      BITNET_PARALLEL: ${BITNET_PARALLEL:-1}
      BITNET_FLASH_ATTN: ${BITNET_FLASH_ATTN:-false}
      BITNET_MLOCK: ${BITNET_MLOCK:-true}
      BITNET_STARTUP_TIMEOUT_S: ${BITNET_STARTUP_TIMEOUT_S:-30}
      HUNYUAN_UI_URL: ${HUNYUAN_UI_URL:-}
      COMFYUI_UI_URL: ${COMFYUI_UI_URL:-}
      A1111_UI_URL: ${A1111_UI_URL:-}
      # Gradio mode (default): http://acestep:7860 | API mode: http://acestep:8001
      ACESTEP_BASE_URL: ${ACESTEP_BASE_URL:-http://acestep:7860}
      ACESTEP_UI_URL: ${ACESTEP_UI_URL:-}
      ACESTEP_PREFERRED_GPU: ${ACESTEP_PREFERRED_GPU:-1}
      OCABRA_ADMIN_USER: ${OCABRA_ADMIN_USER:-ocabra}
      OCABRA_ADMIN_PASS: ${OCABRA_ADMIN_PASS:-ocabra}
      JWT_SECRET: ${JWT_SECRET:-}
      REQUIRE_API_KEY_OPENAI: ${REQUIRE_API_KEY_OPENAI:-true}
      REQUIRE_API_KEY_OLLAMA: ${REQUIRE_API_KEY_OLLAMA:-true}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      LANGFUSE_CAPTURE_CONTENT: ${LANGFUSE_CAPTURE_CONTENT:-false}
      LANGFUSE_SAMPLE_RATE: ${LANGFUSE_SAMPLE_RATE:-1.0}
    env_file: .env
#    ports:
#      - "8000:8000"
    volumes:
      - /docker/ai-models/ocabra/models:/data/models
      - /docker/ai-models/ocabra/hf_cache:/data/hf_cache
      - ./data/openai_files:/data/openai_files
      - backends_data:/data/backends
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker-compose.yml:/opt/ocabra/docker-compose.yml:ro
      - ./.env:/opt/ocabra/.env:ro
      # ACE-Step weights checkpoint dir (~11 GB) is mounted into the modular
      # install path so the cloned src/ tree finds them where the acestep
      # server expects (<project_root>/checkpoints/). Avoids re-downloading
      # at first generation. NOT read-only — ACE-Step writes minor config
      # syncs (configuration_*.py) into the checkpoint subdirs on first
      # init. Bloque 15 — 2026-04-25.
      - /docker/ACE-Step-1.5/checkpoints:/data/backends/acestep/src/checkpoints
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    user: "${FRONTEND_UID:-1000}:${FRONTEND_GID:-1000}"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ocabra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ocabra}
      POSTGRES_DB: ${POSTGRES_DB:-ocabra}
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ocabra}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  hw-monitor:
    build:
      context: ./hw-monitor
      dockerfile: Dockerfile
    privileged: true
    runtime: nvidia
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://ocabra:${POSTGRES_PASSWORD:-ocabra}@postgres:5432/ocabra
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - /sys/class/powercap:/sys/class/powercap:ro
      - /sys/class/hwmon:/sys/class/hwmon:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - /docker/ai-models/ollama:/root/.ollama
    ports:
      - "7869:11434"
    restart: unless-stopped

  hunyuan:
    profiles: ["services"]
    build:
      context: ./Hunyuan3D-2.1
      dockerfile: docker/Dockerfile
    command: ["python", "gradio_app.py", "--host", "0.0.0.0", "--port", "8080",
              "--cache-path", "./gradio_cache", "--low_vram_mode",
              "--root-path", "${HUNYUAN_UI_URL:-}"]
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      IDLE_TIMEOUT_SECONDS: ${HUNYUAN_IDLE_UNLOAD_SECONDS:-300}
      IDLE_CHECK_INTERVAL_SECONDS: 30
      HUNYUAN_ENABLE_CPU_OFFLOAD: ${HUNYUAN_ENABLE_CPU_OFFLOAD:-true}
      MALLOC_TRIM_THRESHOLD_: 0
      HF_HOME: /root/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /root/.cache/huggingface/hub
    volumes:
      - /docker/ai-models/ocabra/hf_cache:/root/.cache/huggingface
      - /docker/ai-models/ocabra/models/hunyuan3d:/workspace/Hunyuan3D-2.1/gradio_cache
      - /docker/ai-models/ocabra/models/hy3dgen:/root/.cache/hy3dgen
    ports:
      - "${HUNYUAN_PORT:-8480}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 180s
    restart: unless-stopped

  comfyui:
    profiles: ["services"]
    build:
      context: ./services/comfyui
      dockerfile: Dockerfile
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HF_HOME: /root/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /root/.cache/huggingface/hub
    volumes:
      - /docker/ai-models/ocabra/hf_cache:/root/.cache/huggingface
      - /docker/ai-models/ocabra/models/image/checkpoints:/opt/ComfyUI/models/checkpoints
      - /docker/ai-models/ocabra/models/image/vae:/opt/ComfyUI/models/vae
      - /docker/ai-models/ocabra/models/image/loras:/opt/ComfyUI/models/loras
      - /docker/ai-models/ocabra/models/image/embeddings:/opt/ComfyUI/models/embeddings
      - /docker/ai-models/ocabra/models/image/controlnet:/opt/ComfyUI/models/controlnet
      - /docker/ai-models/ocabra/models/image/upscalers:/opt/ComfyUI/models/upscale_models
      - /docker/ai-models/ocabra/models/comfyui:/opt/ComfyUI/user
    ports:
      - "${COMFYUI_PORT:-8188}:8188"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  a1111:
    profiles: ["services"]
    build:
      context: ./services/a1111
      dockerfile: Dockerfile
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /home/a1111/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /home/a1111/.cache/huggingface/hub
      COMMANDLINE_ARGS: --listen --api --port 7860 --skip-torch-cuda-test --enable-insecure-extension-access
    volumes:
      - /docker/ai-models/ocabra/hf_cache:/home/a1111/.cache/huggingface
      - a1111_venv:/opt/stable-diffusion-webui/venv
      - /docker/ai-models/ocabra/models/image/checkpoints:/opt/stable-diffusion-webui/models/Stable-diffusion
      - /docker/ai-models/ocabra/models/image/vae:/opt/stable-diffusion-webui/models/VAE
      - /docker/ai-models/ocabra/models/image/loras:/opt/stable-diffusion-webui/models/Lora
      - /docker/ai-models/ocabra/models/image/embeddings:/opt/stable-diffusion-webui/embeddings
      - /docker/ai-models/ocabra/models/image/upscalers:/opt/stable-diffusion-webui/models/ESRGAN
      - /docker/ai-models/ocabra/models/a1111:/opt/stable-diffusion-webui/config_states
      - ./services/a1111/ocabra-free-memory:/opt/stable-diffusion-webui/extensions/ocabra-free-memory
    ports:
      - "${A1111_PORT:-7860}:7860"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/sdapi/v1/memory"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 180s
    restart: unless-stopped

  acestep:
    profiles: ["services"]
    build:
      context: /docker/ACE-Step-1.5
      dockerfile: Dockerfile
    image: acestep:latest
    container_name: ocabra-acestep-1
    runtime: nvidia
    ipc: host
    shm_size: "2gb"
    environment:
      NVIDIA_VISIBLE_DEVICES: ${ACESTEP_NVIDIA_VISIBLE_DEVICES:-1}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # "gradio" (default) — Gradio UI on port 7860
      # "api"              — REST API on port 8001 (set ACESTEP_BASE_URL=http://acestep:8001 in api service)
      ACESTEP_MODE: ${ACESTEP_MODE:-gradio}
      ACESTEP_LLM_BACKEND: ${ACESTEP_LLM_BACKEND:-pt}
      ACESTEP_INIT_SERVICE: ${ACESTEP_INIT_SERVICE:-true}
      ACESTEP_CONFIG_PATH: ${ACESTEP_CONFIG_PATH:-acestep-v15-turbo}
      ACESTEP_LM_MODEL_PATH: ${ACESTEP_LM_MODEL_PATH:-acestep-5Hz-lm-0.6B}
      TOKENIZERS_PARALLELISM: "false"
      HF_HOME: /root/.cache/huggingface
    env_file:
      - path: .env
        required: false
    volumes:
      - /docker/ai-models/ocabra/hf_cache:/root/.cache/huggingface
      - /docker/ACE-Step-1.5/checkpoints:/app/checkpoints
      - /docker/ACE-Step-1.5/gradio_outputs:/app/gradio_outputs
      - /docker/ACE-Step-1.5/lora_output:/app/lora_output
    ports:
      # Gradio mode (default): port 7860
      - "${ACESTEP_GRADIO_PORT:-7862}:7860"
      # API mode: uncomment if running with ACESTEP_MODE=api
      # - "${ACESTEP_API_PORT:-8001}:8001"
    healthcheck:
      test: >-
        curl -sf http://localhost:7860/ > /dev/null 2>&1 ||
        curl -sf http://localhost:8001/health > /dev/null 2>&1 ||
        exit 1
      interval: 30s
      timeout: 10s
      start_period: 300s
      retries: 3
    restart: unless-stopped

  gateway:
    profiles: ["services"]
    build:
      context: ./gateway
      dockerfile: Dockerfile
    env_file: .env
    environment:
      OCABRA_API_URL: http://api:8000
      GATEWAY_PORT: "9000"
    ports:
      - "${GATEWAY_PORT:-9000}:9000"
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "8484:80"
      - "${SERVICES_PORTAL_PORT:-8485}:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/caddy_data:/data
      - ./caddy/caddy_config:/config
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  a1111_venv:
  backends_data:
