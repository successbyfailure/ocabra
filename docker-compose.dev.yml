services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    command: uvicorn ocabra.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ${MODELS_DIR:-./data/models}:/data/models
      - ${HF_CACHE_DIR:-./data/hf_cache}:/data/hf_cache
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
