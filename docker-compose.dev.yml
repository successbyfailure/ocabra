services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    runtime: nvidia
    ipc: host
    shm_size: "8gb"
    command: uvicorn ocabra.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      MODELS_DIR: /data/models
      HF_CACHE_DIR: /data/hf_cache
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ./backend:/app
      - ${MODELS_DIR:-./data/models}:/data/models
      - ${HF_CACHE_DIR:-./data/hf_cache}:/data/hf_cache
    ports:
      - "8001:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000

  caddy:
    volumes:
      - ./caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro

  ollama:
    image: ollama/ollama:latest
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
